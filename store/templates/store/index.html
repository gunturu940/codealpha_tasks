<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #667eea, #764ba2); }
        .card { border-radius: 15px; transition: transform 0.3s; border: none; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 25px; padding: 8px 25px; }
        .price { color: #28a745; font-size: 1.3rem; font-weight: bold; }
        footer { background: linear-gradient(135deg, #667eea, #764ba2); }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold fs-4">🛍️ ShopEasy</span>
    <div>
        <a href="#" class="btn btn-light btn-sm me-2">Login</a>
        <a href="#" class="btn btn-warning btn-sm">🛒 Cart</a>
    </div>
</nav>

<!-- Hero -->
<div class="text-center py-5" style="background: linear-gradient(135deg, #667eea22, #764ba222);">
    <h1 class="fw-bold">Welcome to ShopEasy 🎉</h1>
    <p class="text-muted">Best products at best prices!</p>
</div>

<!-- Products -->
<div class="container py-5">
    <h3 class="mb-4 fw-bold">🔥 Featured Products</h3>
    <div class="row">
        {% for product in products %}
        <div class="col-md-4 mb-4">
            <div class="card shadow p-3">
                <div class="card-body">
                    <h5 class="card-title fw-bold">{{ product.name }}</h5>
                    <p class="price">₹{{ product.price }}</p>
                    <p class="card-text text-muted">{{ product.description }}</p>
                    <a href="/add-to-cart/{{ product.id }}/" class="btn btn-primary w-100">Add to cart</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<!-- Footer -->
<footer class="text-white text-center py-4 mt-5">
    <p class="mb-0">© 2026 ShopEasy | Built with Django 🚀</p>
</footer>

</body>
</html>
