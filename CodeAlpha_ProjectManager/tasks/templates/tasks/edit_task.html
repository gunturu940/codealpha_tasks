{% extends 'tasks/base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="fw-bold mb-4">
                <i class="fas fa-edit me-2" style="color:#667eea"></i>
                Edit Task
            </h3>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Task Title</label>
                    <input type="text" name="title" class="form-control"
                           value="{{ task.title }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Description</label>
                    <textarea name="description" class="form-control" 
                              rows="3">{{ task.description }}</textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Priority</label>
                        <select name="priority" class="form-select">
                            <option value="low" {% if task.priority == 'low' %}selected{% endif %}>
                                🟢 Low</option>
                            <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>
                                🟡 Medium</option>
                            <option value="high" {% if task.priority == 'high' %}selected{% endif %}>
                                🔴 High</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Deadline</label>
                        <input type="date" name="deadline" class="form-control"
                               value="{{ task.deadline }}">
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">
                        <i class="fas fa-save me-2"></i>Save Changes
                    </button>
                    <a href="{% url 'task_detail' task.pk %}"
                       class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
