<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProjectManager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    
    * { font-family: 'Inter', sans-serif; }
    body { background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%); min-height: 100vh; }
    
    .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); box-shadow: 0 4px 20px rgba(102,126,234,0.4); }
    
    .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
    
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); border: none; border-radius: 10px; font-weight: 600; transition: all 0.3s ease; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); background: linear-gradient(135deg, #764ba2, #667eea); }
    
    .kanban-col { background: #f0f2f8; border-radius: 16px; min-height: 500px; padding: 20px; transition: background 0.3s ease; }
    .kanban-col:hover { background: #e8ebf5; }
    
    .task-card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); cursor: pointer; transition: all 0.25s ease; border-left: 4px solid transparent; }
    .task-card:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 8px 25px rgba(0,0,0,0.12); border-left: 4px solid #667eea; }
    
    .task-card.priority-high { border-left: 4px solid #dc3545; }
    .task-card.priority-medium { border-left: 4px solid #ffc107; }
    .task-card.priority-low { border-left: 4px solid #28a745; }
    
    .progress { height: 8px; border-radius: 10px; background: #e9ecef; }
    .progress-bar { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 10px; transition: width 0.6s ease; }
    
    .due-alert { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: white; border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 600; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
    
    .badge-todo { background: linear-gradient(135deg, #667eea, #764ba2); }
    .badge-inprogress { background: linear-gradient(135deg, #f7971e, #ffd200); color:#000; }
    .badge-done { background: linear-gradient(135deg, #11998e, #38ef7d); color:#000; }

    .page-fade { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .stat-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 16px; padding: 20px; text-align: center; }

    .comment-bubble { background: #f8f9ff; border-radius: 12px; border-left: 3px solid #667eea; padding: 12px 16px; margin-bottom: 12px; transition: all 0.2s ease; }
    .comment-bubble:hover { background: #eef0ff; transform: translateX(4px); }

    .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
</style>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'dashboard' %}">
            <i class="fas fa-tasks me-2"></i>ProjectManager
        </a>
        <div class="ms-auto">
            {% if user.is_authenticated %}
            <span class="text-white me-3">👋 {{ user.username }}</span>
            <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">Logout</a>
            {% endif %}
        </div>
    </div>
</nav>
<div class="container mt-4">
    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-info alert-dismissible fade show">{{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
